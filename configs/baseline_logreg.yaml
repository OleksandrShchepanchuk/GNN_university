defaults: configs/base.yaml

run:
  name: baseline_logreg

model:
  type: baseline_logreg
  # If true, the input is [edge_feats || x_src || x_tgt || |x_src - x_tgt| || x_src * x_tgt];
  # otherwise just raw edge features (POST_PROPERTIES + temporal + is_title).
  use_node_features: true
  sklearn:
    C: 1.0
    penalty: l2
    solver: lbfgs
    max_iter: 2000
    class_weight: balanced

training:
  # The sklearn baseline trains in one fit() call; PyTorch loops do not apply.
  epochs: 1
  batch_size: 0

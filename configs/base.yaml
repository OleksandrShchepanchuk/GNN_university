# Base config — inherited (logically) by every model-specific config.
# scripts/run_experiment.py merges base.yaml under the chosen config so that
# per-model files only need to override differences.

task:
  name: edge_sign_classification
  # POST_LABEL remap: -1 -> 0 (negative), +1 -> 1 (neutral_or_positive).
  # We never sample non-edges; only observed hyperlinks are examples.
  label_mapping:
    "-1": 0
    "1": 1
  num_classes: 2

data:
  source: snap_reddit_hyperlinks
  body_file: soc-redditHyperlinks-body.tsv
  title_file: soc-redditHyperlinks-title.tsv
  embeddings_file: web-redditEmbeddings-subreddits.csv
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  # Drop edges whose endpoints have no LIWC embedding (configurable).
  drop_missing_embeddings: false
  # Combine body + title rows (each is a directed hyperlink event).
  combine_body_title: true
  # Aggregation: keep each hyperlink event as a separate example, OR aggregate
  # repeated (src,dst) pairs into one edge with majority label.
  aggregation: per_event   # one of: per_event | per_pair_majority
  # Frozen seed for the train_mp / train_sup random partition inside
  # build_message_passing_split. MUST be independent of training.seed:
  # the multi-seed retrain only varies model init / dropout, not the
  # structure of the MP graph each fold sees.
  partition_seed: 42

split:
  strategy: temporal       # one of: temporal | random_stratified
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15
  seed: 42
  # For temporal split, edges are ordered by TIMESTAMP and cut by quantile.
  # For random_stratified, splits preserve class balance per fold.

features:
  use_liwc_embeddings: true
  embedding_dim: 300
  # Engineered edge-level features actually produced by
  # reddit_gnn.data.features.FeatureBuilder (truthful list — only what the
  # builder emits at runtime). 93 columns total per edge.
  engineered_edge_features:
    - raw_post_properties        # 86 raw LIWC dims from POST_PROPERTIES
    - is_title                   # 1 binary flag (body vs title source)
    - year_norm                  # 6 temporal columns (scaler is train-fit):
    - month_sin                  #   year_norm, month sin/cos,
    - month_cos                  #   day-of-week sin/cos,
    - dayofweek_sin              #   days-since-min normalized to [0, 1]
    - dayofweek_cos
    - days_since_min_norm
  # Per-node features (FeatureBuilder.transform_node_features):
  #   * 300-D SNAP LIWC embedding (zeros + unknown_flag when missing)
  #   * 11 structural columns (in/out/total degree, signed in/out degree,
  #     signed-in/-out ratios, log1p degrees) — StandardScaler fit on TRAIN
  #     edges only.
  #   * 172 aggregated edge-property columns (mean incoming + mean outgoing
  #     POST_PROPERTIES per node).
  standardize: true              # fit on train only

training:
  device: cpu                    # set to "cuda" if available
  epochs: 100
  batch_size: 4096               # for edge-level mini-batching where applicable
  early_stopping_patience: 15
  lr: 0.005
  weight_decay: 0.0005
  optimizer: adam
  scheduler: none                # cosine | plateau | none
  grad_clip: 1.0
  seed: 42
  # Loss is BCEWithLogits with pos_weight = #neg/#pos computed at runtime
  # from the TRAIN supervision labels (no YAML knob — see compute_pos_weight).
  log_every_n_epochs: 1

evaluation:
  metrics:
    - accuracy
    - balanced_accuracy
    - f1_macro
    - f1_negative
    - roc_auc
    - pr_auc
    - confusion_matrix
  primary_metric: pr_auc_neg     # PR-AUC for the negative class — headline metric
  save_predictions: true

run:
  name: base                     # override per config
  output_root: models
  checkpoints_subdir: checkpoints
  predictions_subdir: predictions

tracking:
  # MLflow tracking. See reddit_gnn.tracking.* and the "Experiment tracking
  # with MLflow" section in README.md for details. CLI flag --no-tracking
  # overrides `enabled: true` for a single invocation.
  enabled: true
  tracking_uri: null             # null -> file:<project_root>/mlruns
  experiment_name: reddit_signed
  run_name_template: "{model_type}-{timestamp}"

defaults: configs/base.yaml

run:
  name: graphsage

model:
  type: sage
  encoder:
    in_channels: null
    hidden_channels: 128
    out_channels: 64
    num_layers: 2
    dropout: 0.5
    use_batchnorm: true
    aggr: mean                   # one of: mean | max | sum | lstm
  decoder:
    type: edge_mlp
    hidden: 64
    dropout: 0.3

training:
  epochs: 200
  lr: 0.005
  weight_decay: 0.0005
  early_stopping_patience: 20

  # Neighbor sampling — only used when loaders/loaders.py is wired up.
  neighbor_sampler:
    num_neighbors: [15, 10]
    batch_size: 4096

defaults: configs/base.yaml

run:
  name: graphsage

model:
  type: sage
  encoder:
    in_channels: null
    # Reduced from 128 to 64 after seed-stability investigation. With
    # hidden=128, sage-seed0 stayed pinned at val_pr_auc ~ 0.13 (class
    # prior) for 37 epochs before early-stopping fired, while seeds 1/2
    # reached 0.50+. Hypothesis: SAGE concat-then-project widens the
    # inner activation to 2*hidden=256, landing one of three inits in a
    # saddle the optimizer can't escape under the 9.5x class weight.
    # h=64 halves the inner width and stabilises across seeds.
    hidden_channels: 64
    out_channels: 64
    num_layers: 2
    dropout: 0.5
    use_batchnorm: true
    aggr: mean                   # one of: mean | max | sum | lstm
  decoder:
    type: edge_mlp
    hidden: 64
    dropout: 0.3

training:
  epochs: 200
  lr: 0.005
  weight_decay: 0.0005
  early_stopping_patience: 20

  # Neighbor sampling — only used when loaders/loaders.py is wired up.
  neighbor_sampler:
    num_neighbors: [15, 10]
    batch_size: 4096

defaults: configs/base.yaml

run:
  name: gat

model:
  type: gat
  encoder:
    in_channels: null
    hidden_channels: 128         # total post-concat width per layer
    out_channels: 64
    num_layers: 2
    heads: 4
    concat: true                 # also accepts a list[bool] of length num_layers
    dropout: 0.5
    attn_dropout: 0.2
    use_batchnorm: false
  decoder:
    type: edge_mlp
    hidden: 64
    dropout: 0.3

training:
  epochs: 200
  lr: 0.003
  weight_decay: 0.0005
  early_stopping_patience: 20

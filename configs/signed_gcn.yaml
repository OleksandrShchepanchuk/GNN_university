defaults: configs/base.yaml

run:
  name: signed_gcn

model:
  type: signed_gcn
  encoder:
    in_channels: null
    hidden_channels: 64
    num_layers: 2
    # PyG's SignedGCN learns separate aggregations along positive and negative
    # edges. The MP graph is partitioned by label_binary; an empty pos/neg
    # half-graph triggers a warning and a dummy self-loop (see SignedGCNEncoder).
    lamb: 5.0
  decoder:
    type: edge_mlp
    hidden: 64
    dropout: 0.3

training:
  epochs: 200
  lr: 0.005                      # safer than 0.01 — SignedGCN with no BN can diverge
  weight_decay: 0.00001
  early_stopping_patience: 20

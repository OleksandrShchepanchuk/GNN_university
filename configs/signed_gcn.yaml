defaults: configs/base.yaml

run:
  name: signed_gcn

model:
  type: signed_gcn
  # PyG's SignedGCN learns separate aggregations along positive and negative
  # edges. The encoder builds the signed message-passing graph from TRAIN
  # labels only — val/test labels are never exposed during message passing.
  encoder:
    hidden_channels: 64
    num_layers: 2
    lamb: 5.0                  # balanced/unbalanced triangle regularization weight
  decoder:
    type: mlp_edge
    hidden_channels: 64
    num_layers: 2
    dropout: 0.3
    edge_feature_combiner: concat

training:
  epochs: 200
  lr: 0.01
  weight_decay: 0.00001
  early_stopping_patience: 20

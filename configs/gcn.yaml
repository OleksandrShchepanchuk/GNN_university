defaults: configs/base.yaml

run:
  name: gcn

model:
  type: gcn
  encoder:
    in_channels: null            # filled in at runtime from node_features.shape[1]
    hidden_channels: 128
    out_channels: 64
    num_layers: 2
    dropout: 0.5
    use_batchnorm: true
  decoder:
    type: edge_mlp
    hidden: 64
    dropout: 0.3
    # edge_feature_dim filled in at runtime from edge_features.shape[1] (93 with all toggles on)

training:
  epochs: 200
  lr: 0.005
  weight_decay: 0.0005
  early_stopping_patience: 20

defaults: configs/base.yaml

run:
  name: baseline_mlp

model:
  type: baseline_mlp
  # MLP input is [edge_feats || x_src || x_tgt || |x_src - x_tgt| || x_src * x_tgt].
  hidden: 256
  dropout: 0.3
  # edge_feature_dim / node_feature_dim filled in at runtime.

training:
  epochs: 100
  batch_size: 4096
  lr: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 15
